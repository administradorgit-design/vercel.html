<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PORTAL — Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', Arial, sans-serif;
    background: #000;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    color: #fff;
  }
  #matrixCanvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: #000;
  }
  .card {
    position: relative;
    z-index: 1;
    background: rgba(0, 0, 0, 0.85);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 40px 40px 32px;
    width: 360px;
    box-shadow: 0 16px 70px rgba(0,0,0,0.45);
  }
  .logo {
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #eee;
    margin-bottom: 28px;
  }
  hr {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.12);
    margin-bottom: 28px;
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #ddd;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 4px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    color: #eee;
    background: rgba(255,255,255,0.05);
    outline: none;
    margin-bottom: 18px;
    transition: border-color 0.15s, background 0.15s;
  }
  input:focus {
    border-color: #bbb;
    background: rgba(255,255,255,0.08);
  }
  .forgot {
    display: block;
    font-size: 12px;
    color: #d4d4d4;
    text-decoration: none;
    margin-top: -12px;
    margin-bottom: 22px;
  }
  .forgot:hover { color: #333; text-decoration: underline; }
  .btn {
    width: 100%;
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 11px;
    font-size: 13px;
    font-family: inherit;
    font-weight: 600;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: #f2f2f2; color: #111; }
  .btn:disabled { background: #555; cursor: not-allowed; }
  .error {
    display: none;
    font-size: 12px;
    color: #cc0000;
    margin-bottom: 12px;
  }
  footer {
    text-align: center;
    font-size: 11px;
    color: #bbb;
    margin-top: 24px;
  }
</style>
</head>
<body>
<canvas id="matrixCanvas"></canvas>
<div class="card">
  <div class="logo">BEM VINDOS!</div>
  <hr>
  <div class="error" id="errorMsg"></div>
  <label for="email">E-mail</label>
  <input type="email" id="email" placeholder="seuemail@exemplo.com" autocomplete="email">
  <label for="password">Senha</label>
  <input type="password" id="password" placeholder="Digite sua senha" autocomplete="current-password">
  <button class="btn" id="loginBtn" onclick="handleLogin()">ENTRAR</button>
  <footer>© 2024 UniDatas. Todos os direitos reservados.</footer>
</div>
<script src="config.js"></script>
<script>
  const API_URL = window.UNIDATAS_API_URL || 'http://localhost:8000';
  // Controle de tentativas no lado do cliente (camada extra — o back-end também bloqueia)
  let tentativas = 0;
  const MAX_TENTATIVAS = 5;
  const BLOQUEIO_MS = 30000; // 30 segundos
  let bloqueadoAte = null;

  function setErro(msg) {
    const err = document.getElementById('errorMsg');
    err.textContent = msg;
    err.style.display = 'block';
  }

  function limpaErro() {
    const err = document.getElementById('errorMsg');
    err.style.display = 'none';
  }

  function setBotao(loading) {
    const btn = document.getElementById('loginBtn');
    btn.disabled = loading;
    btn.textContent = loading ? 'ENTRANDO...' : 'ENTRAR';
  }

  async function handleLogin() {
    limpaErro();

    // Verifica bloqueio local
    if (bloqueadoAte && Date.now() < bloqueadoAte) {
      const seg = Math.ceil((bloqueadoAte - Date.now()) / 1000);
      setErro(`Muitas tentativas. Tente novamente em ${seg}s.`);
      return;
    }

    const email = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;

    // Validações básicas no front
    if (!email || !password) {
      setErro('Preencha e-mail e senha.');
      return;
    }

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
      setErro('Digite um e-mail válido.');
      return;
    }

    if (password.length < 6) {
      setErro('A senha deve ter pelo menos 6 caracteres.');
      return;
    }

    setBotao(true);

    try {
      // Toda autenticação acontece no back-end — nenhuma credencial no front
      const response = await fetch(`${API_URL}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await response.json();

      if (response.ok && data.token) {
        // Guarda o JWT em sessionStorage (some ao fechar o navegador)
        sessionStorage.setItem('token', data.token);
        sessionStorage.setItem('usuario', email);
        tentativas = 0;
        // Redireciona pro dashboard
        window.location.href = 'painel.html';
      } else {
        tentativas++;
        if (tentativas >= MAX_TENTATIVAS) {
          bloqueadoAte = Date.now() + BLOQUEIO_MS;
          setErro('Muitas tentativas. Aguarde 30 segundos.');
        } else {
          setErro(data.message || 'E-mail ou senha incorretos.');
        }
      }
    } catch (err) {
      setErro('Erro de conexão. Tente novamente.');
    } finally {
      setBotao(false);
    }
  }

  // Submit com Enter
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });

  const canvas = document.getElementById('matrixCanvas');
  const ctx = canvas.getContext('2d');
  const caracteres = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*';
  const fontSize = 18;
  const velocidade = 0.45;
  let drops = [];

  function ajustarCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const colunas = Math.floor(canvas.width / fontSize);
    drops = Array.from({ length: colunas }, () => 1);
  }

  function desenharMatriz() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#e5e5e5';
    ctx.font = `${fontSize}px monospace`;

    for (let i = 0; i < drops.length; i++) {
      const texto = caracteres[Math.floor(Math.random() * caracteres.length)];
      ctx.fillText(texto, i * fontSize, drops[i] * fontSize);
      if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
        drops[i] = 0;
      }
      drops[i] += velocidade;
    }
    requestAnimationFrame(desenharMatriz);
  }

  ajustarCanvas();
  window.addEventListener('resize', ajustarCanvas);
  desenharMatriz();
</script>
</body>
</html>
