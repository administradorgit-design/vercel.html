<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PORTAL — Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', Arial, sans-serif;
    background:
      radial-gradient(circle at top left, rgba(120,169,255,0.15), transparent 28%),
      linear-gradient(135deg, #07111b 0%, #0c1724 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    color: #f3f6fb;
  }

  .deco-lines {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .deco-lines svg { width: 100%; height: 100%; }

  .card {
    position: relative;
    z-index: 1;
    background: linear-gradient(135deg, rgba(16,32,49,0.96), rgba(8,18,30,0.96));
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 40px 40px 32px;
    width: 360px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.3);
    backdrop-filter: blur(8px);
  }

  .logo {
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #eaf2ff;
    margin-bottom: 22px;
  }

  hr {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.08);
    margin-bottom: 24px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #9fb0c7;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  input {
    width: 100%;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    color: #f3f6fb;
    background: rgba(255,255,255,0.04);
    outline: none;
    margin-bottom: 18px;
    transition: border-color 0.15s, background 0.15s;
  }
  input:focus {
    border-color: rgba(120,169,255,0.4);
    background: rgba(255,255,255,0.07);
  }

  .btn {
    width: 100%;
    background: linear-gradient(135deg, #78a9ff, #4f7dd0);
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 11px;
    font-size: 13px;
    font-family: inherit;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 12px 24px rgba(79,125,208,0.24);
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 14px 28px rgba(79,125,208,0.32); }
  .btn:disabled { background: #485766; box-shadow: none; cursor: not-allowed; transform: none; }

  .error {
    display: none;
    font-size: 12px;
    color: #ff7b7b;
    margin-bottom: 12px;
  }

  .success {
    display: none;
    font-size: 12px;
    color: #8de8b6;
    margin-bottom: 12px;
    line-height: 1.5;
  }

  footer {
    text-align: center;
    font-size: 11px;
    color: #71849a;
    margin-top: 24px;
  }
</style>
</head>
<body>

<!-- Linhas de circuito -->
<div class="deco-lines">
  <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <g stroke="#444" stroke-width="1" fill="none" opacity="0.7">
      <!-- direita -->
      <polyline points="1100,0 1100,200 1300,200 1300,400 1200,400 1200,600"/>
      <polyline points="1300,300 1440,300"/>
      <circle cx="1300" cy="200" r="3" fill="#444"/>
      <circle cx="1200" cy="400" r="3" fill="#444"/>
      <!-- esquerda -->
      <polyline points="200,900 200,650 50,650 50,450 150,450"/>
      <polyline points="50,550 0,550"/>
      <circle cx="50" cy="650" r="3" fill="#444"/>
      <!-- ponto ciano -->
      <circle cx="50" cy="820" r="5" fill="#666" opacity="0.8"/>
    </g>
  </svg>
</div>

<div class="card">
  <div class="logo">BEM VINDOS!</div>
  <hr>
  <div class="error" id="errorMsg"></div>
  <label for="email">E-mail</label>
  <input type="email" id="email" placeholder="seuemail@exemplo.com" autocomplete="email">
  <label for="password">Senha</label>
  <input type="password" id="password" placeholder="Digite sua senha" autocomplete="current-password">
  <button class="btn" id="loginBtn" onclick="handleLogin()">ENTRAR</button>
  <footer>© 2024 UniDatas. Todos os direitos reservados.</footer>
</div>

<script>
  const API_URL = window.UNIDATAS_API_URL || 'https://venc123-production.up.railway.app';
  let tentativas = 0;
  const MAX_TENTATIVAS = 5;
  const BLOQUEIO_MS = 30000;
  let bloqueadoAte = null;

  function setErro(msg) {
    const err = document.getElementById('errorMsg');
    err.textContent = msg;
    err.style.display = 'block';
  }
  function limpaErro() {
    document.getElementById('errorMsg').style.display = 'none';
  }
  function setBotao(loading) {
    const btn = document.getElementById('loginBtn');
    btn.disabled = loading;
    btn.textContent = loading ? 'ENTRANDO...' : 'ENTRAR';
  }

  async function handleLogin() {
    limpaErro();
    if (bloqueadoAte && Date.now() < bloqueadoAte) {
      const seg = Math.ceil((bloqueadoAte - Date.now()) / 1000);
      setErro(`Muitas tentativas. Tente novamente em ${seg}s.`);
      return;
    }
    const email = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    if (!email || !password) { setErro('Preencha e-mail e senha.'); return; }
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) { setErro('Digite um e-mail válido.'); return; }
    if (password.length < 6) { setErro('A senha deve ter pelo menos 6 caracteres.'); return; }
    setBotao(true);
    try {
      const response = await fetch(`${API_URL}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await response.json();
      if (response.ok && data.token) {
        sessionStorage.setItem('token', data.token);
        sessionStorage.setItem('usuario', email);
        tentativas = 0;
        window.location.href = 'painel.html';
      } else {
        tentativas++;
        if (tentativas >= MAX_TENTATIVAS) {
          bloqueadoAte = Date.now() + BLOQUEIO_MS;
          setErro('Muitas tentativas. Aguarde 30 segundos.');
        } else {
          setErro(data.message || 'E-mail ou senha incorretos.');
        }
      }
    } catch (err) {
      setErro('Erro de conexão. Tente novamente.');
    } finally {
      setBotao(false);
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

  /* ── PROTEÇÃO DEVTOOLS (apenas desktop) ── */
  (function() {
    const isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent) || window.innerWidth < 768;
    if (isMobile) return;

    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', function(e) {
      if (e.key === 'F12') { e.preventDefault(); return false; }
      if (e.ctrlKey && e.shiftKey && ['I','i','J','j','C','c'].includes(e.key)) { e.preventDefault(); return false; }
      if (e.ctrlKey && ['U','u','S','s'].includes(e.key)) { e.preventDefault(); return false; }
    });

    let violacao = false;
    function detectarDevTools() {
      if (violacao) return;
      const threshold = 200;
      const wDiff = window.outerWidth - window.innerWidth;
      if (wDiff > threshold) {
        violacao = true;
        document.body.innerHTML = `
          <div style="position:fixed;inset:0;background:#000;z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;font-family:Arial;">
            <div style="color:#fff;font-size:22px;font-weight:700;">ACESSO BLOQUEADO</div>
            <div style="color:#e63946;font-size:14px;text-align:center;max-width:400px;">Ferramentas de desenvolvedor foram detectadas. O sistema foi encerrado por violação de segurança.</div>
            <div style="color:#666;font-size:12px;text-align:center;max-width:340px;">Feche o DevTools, limpe seus dados e acesse novamente.</div>
            <button onclick="window.location.href='portal-login.html'" style="background:#e63946;color:#fff;border:none;padding:12px 32px;border-radius:4px;font-weight:700;cursor:pointer;font-size:14px;">RETORNAR</button>
          </div>
        `;
      }
    }
    setInterval(detectarDevTools, 1500);
    window.addEventListener('resize', detectarDevTools);
  })();
</script>
</body>
</html>
